<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Overlay Pro - Firebase</title>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;font-family:'Luckiest Guy',cursive;min-height:100vh;overflow-x:hidden}
body.wm{background:transparent!important}
body.wm .ctrl-btn,body.wm .particles,body.wm .stars,body.wm #mainView .glow-line,body.wm #mainView .sub-area,body.wm #mainView .foot-area,body.wm .fb-status{display:none}

/* Firebase durum */
.fb-status{position:fixed;bottom:10px;left:10px;z-index:9998;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.7);padding:6px 14px;border-radius:20px;font-family:'Orbitron',sans-serif;font-size:9px;color:#888}
.fb-dot{width:8px;height:8px;border-radius:50%}
.fb-dot.ok{background:#00ff88;box-shadow:0 0 8px #00ff88}
.fb-dot.err{background:#ff4444;box-shadow:0 0 8px #ff4444}
.fb-dot.wait{background:#ffd700;box-shadow:0 0 8px #ffd700;animation:blinker 1s linear infinite}
@keyframes blinker{50%{opacity:.3}}

.ctrl-btn{position:fixed;top:10px;right:10px;z-index:10000;background:linear-gradient(135deg,#ff0080,#7928ca);border:none;color:#fff;padding:14px 24px;border-radius:30px;cursor:pointer;font-family:'Luckiest Guy',cursive;font-size:14px;box-shadow:0 0 25px rgba(255,0,128,.5);transition:all .3s;letter-spacing:1px}
.ctrl-btn:hover{transform:scale(1.1);box-shadow:0 0 40px rgba(255,0,128,.8)}

/* Panel */
.pnl{position:fixed;top:0;right:-560px;width:540px;height:100vh;background:rgba(5,5,20,.98);border-left:2px solid #ff0080;z-index:9999;transition:right .5s cubic-bezier(.68,-.55,.265,1.55);overflow-y:auto;padding:12px 20px 40px}
.pnl.open{right:0}
.pnl::-webkit-scrollbar{width:5px}
.pnl::-webkit-scrollbar-thumb{background:rgba(255,0,128,.4);border-radius:5px}
.pnl h3{color:#ff0080;margin:18px 0 8px;font-size:13px;letter-spacing:2px;border-bottom:1px solid rgba(255,0,128,.2);padding-bottom:7px;font-family:'Luckiest Guy',cursive}
.pnl label{color:#999;font-size:10px;display:block;margin-bottom:3px;font-family:'Orbitron',sans-serif}
.pnl input[type=text],.pnl input[type=number],.pnl select{width:100%;padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,0,128,.25);border-radius:8px;color:#fff;font-family:'Orbitron',sans-serif;font-size:11px;outline:none;margin-bottom:8px;transition:border .3s}
.pnl input:focus,.pnl select:focus{border-color:#ff0080;box-shadow:0 0 8px rgba(255,0,128,.3)}
.pnl input[type=color]{width:45px;height:32px;border:none;border-radius:6px;cursor:pointer;background:transparent;padding:0}
.pnl input[type=range]{width:100%;accent-color:#ff0080}
.bt{border:none;color:#fff;padding:9px 18px;border-radius:18px;cursor:pointer;font-family:'Luckiest Guy',cursive;font-size:11px;margin:3px;transition:all .3s;display:inline-flex;align-items:center;gap:5px}
.bt:hover{transform:scale(1.05)}
.bt-pk{background:linear-gradient(135deg,#ff0080,#7928ca)}
.bt-gn{background:linear-gradient(135deg,#00ff88,#00aa55);color:#000}
.bt-rd{background:linear-gradient(135deg,#ff4444,#cc0000)}
.bt-bl{background:linear-gradient(135deg,#00d4ff,#0088cc)}
.bt-gd{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000}
.bt-sm{padding:5px 12px;font-size:10px}
hr.sp{border:none;border-top:1px solid rgba(255,0,128,.15);margin:15px 0}
.inl{display:flex;gap:8px;align-items:center}.inl>*{flex:1}
.rw{display:flex;gap:8px;align-items:center;margin-bottom:6px}.rw input{flex:1}
.xb{background:#ff4444;border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gbx{background:rgba(255,255,255,.02);border:1px solid rgba(255,0,128,.12);border-radius:10px;padding:12px;margin-bottom:10px}
.gbx .gtt{color:#ff0080;font-size:11px;font-weight:700;margin-bottom:8px;font-family:'Luckiest Guy',cursive}
.pimg{width:50px;height:50px;border-radius:8px;object-fit:cover;border:2px solid rgba(255,0,128,.3)}
.acc{background:rgba(255,0,128,.06);border:1px solid rgba(255,0,128,.15);border-radius:10px;margin:8px 0;overflow:hidden}
.acc-h{padding:10px 15px;cursor:pointer;color:#ff0080;font-size:12px;font-family:'Luckiest Guy',cursive;display:flex;justify-content:space-between;align-items:center}
.acc-h:hover{background:rgba(255,0,128,.04)}
.acc-b{max-height:0;overflow:hidden;transition:max-height .4s,padding .3s;padding:0 15px}
.acc.op .acc-b{max-height:3000px;padding:12px 15px 15px}
.acc-h .ar{transition:transform .3s;font-size:10px}
.acc.op .acc-h .ar{transform:rotate(180deg)}
.wurl{background:rgba(0,0,0,.4);border:1px solid rgba(0,212,255,.3);border-radius:8px;padding:10px 12px;margin:8px 0;word-break:break-all;color:#00d4ff;font-size:10px;font-family:monospace;line-height:1.5}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;padding-top:5px}
.tab{padding:7px 12px;border:1px solid rgba(255,0,128,.2);background:rgba(255,0,128,.05);color:#ff0080;border-radius:16px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;transition:all .3s;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,#ff0080,#7928ca);color:#fff;border-color:transparent;box-shadow:0 0 12px rgba(255,0,128,.3)}
.tp{display:none}.tp.on{display:block}

/* Partiküller */
.particles,.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.ptc{position:absolute;border-radius:50%;animation:ptcF linear infinite;opacity:0}
@keyframes ptcF{0%{transform:translateY(100vh) rotate(0);opacity:0}10%{opacity:.4}90%{opacity:.4}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}
.star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;box-shadow:0 0 6px #fff,0 0 15px #ff0080;animation:starS linear infinite}
@keyframes starS{0%{transform:translate(-80px,-80px);opacity:1}70%{opacity:1}100%{transform:translate(calc(100vw + 80px),calc(100vh + 80px));opacity:0}}

/* Neon */
.nfl{animation:fl var(--fs,3s) linear infinite}
@keyframes fl{0%,19.9%,22%,62.9%,64%,64.9%,70%,100%{opacity:1}20%,21.9%,63%,63.9%,65%,69.9%{opacity:.33}}

/* Hediye */
.g-sec{position:relative;z-index:10;margin-bottom:25px}
.g-tit{text-align:center;margin-bottom:20px}
.g-tit span{font-size:36px;color:#fff}
.g-wrap{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;perspective:1200px}
.gc{width:150px;height:190px;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:all .5s cubic-bezier(.68,-.55,.265,1.55);overflow:hidden}
.gc:hover{transform:translateY(-20px) scale(1.12) rotateY(15deg)!important;z-index:5}
.gc::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,.08) 50%,transparent 70%);animation:shim 3s ease-in-out infinite;pointer-events:none}
@keyframes shim{0%{transform:translateX(-100%) translateY(-100%) rotate(45deg)}100%{transform:translateX(100%) translateY(100%) rotate(45deg)}}
.gc-v{font-size:50px;margin-bottom:8px;filter:drop-shadow(0 0 8px rgba(255,255,255,.4))}
.gc-v img{width:70px;height:70px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(255,255,255,.4))}
.gc-n{color:#fff;font-size:13px;text-align:center;letter-spacing:1px}
.gc-vl{color:rgba(255,255,255,.6);font-size:10px;margin-top:4px;font-family:'Orbitron',sans-serif}
.gc[data-a=float]{animation:gFl 3s ease-in-out infinite}
.gc[data-a=float]:nth-child(2){animation-delay:.4s}.gc[data-a=float]:nth-child(3){animation-delay:.8s}.gc[data-a=float]:nth-child(4){animation-delay:1.2s}.gc[data-a=float]:nth-child(5){animation-delay:1.6s}.gc[data-a=float]:nth-child(6){animation-delay:2s}.gc[data-a=float]:nth-child(7){animation-delay:2.4s}
@keyframes gFl{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
.gc[data-a=pulse]{animation:gPl 2s ease-in-out infinite}@keyframes gPl{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.gc[data-a=bounce]{animation:gBn 2s ease infinite}@keyframes gBn{0%,20%,50%,80%,100%{transform:translateY(0)}40%{transform:translateY(-25px)}60%{transform:translateY(-12px)}}
.gc[data-a=swing]{animation:gSw 2.5s ease-in-out infinite;transform-origin:top center}@keyframes gSw{0%,100%{transform:rotate(0)}25%{transform:rotate(8deg)}75%{transform:rotate(-8deg)}}
.gc[data-a=jello]{animation:gJl 2s ease infinite}@keyframes gJl{0%,100%{transform:scale3d(1,1,1)}30%{transform:scale3d(1.15,.85,1)}40%{transform:scale3d(.85,1.15,1)}50%{transform:scale3d(1.08,.92,1)}65%{transform:scale3d(.97,1.03,1)}75%{transform:scale3d(1.02,.98,1)}}
.gc[data-a=flip]{animation:gFlp 3s ease-in-out infinite}@keyframes gFlp{0%{transform:perspective(400px) rotateY(0)}40%{transform:perspective(400px) rotateY(180deg)}100%{transform:perspective(400px) rotateY(360deg)}}
.gc[data-a=spin]{animation:gSp 5s linear infinite}@keyframes gSp{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
.gc[data-a=glitch]{animation:gGl 3s steps(20) infinite}@keyframes gGl{0%,50%,100%{transform:translate(0)}10%{transform:translate(-2px,2px)}20%{transform:translate(2px,-2px)}30%{transform:translate(-1px,1px)}40%{transform:translate(1px,-1px)}}

.glow-line{width:80%;max-width:600px;height:2px;margin:20px auto;background:linear-gradient(90deg,transparent,#ff0080,#00d4ff,#00ff88,transparent);border-radius:2px;box-shadow:0 0 10px rgba(255,0,128,.4);position:relative;z-index:10}
.sub-area{text-align:center;margin:20px 0;position:relative;z-index:10}
.sub-area span{font-size:24px;color:#fff}

/* Listeler */
.boards{display:flex;gap:25px;justify-content:center;flex-wrap:wrap;position:relative;z-index:10;margin-top:25px}
.brd{width:320px;border-radius:18px;overflow:hidden;position:relative}
.brd-h{padding:16px 18px;text-align:center;position:relative;overflow:hidden}
.brd-h h2{font-size:15px;letter-spacing:2px;color:#fff}
.brd-h::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:2px;animation:scnL 2s linear infinite}
@keyframes scnL{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.brd-b{padding:8px 12px;min-height:180px}
.pr{display:flex;align-items:center;padding:9px 12px;margin:5px 0;border-radius:10px;transition:all .4s cubic-bezier(.68,-.55,.265,1.55);opacity:0;animation-fill-mode:both}
.pr:hover{transform:translateX(8px) scale(1.02)}
.pr[data-a=slideL]{animation:rSL .6s ease-out both}@keyframes rSL{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
.pr[data-a=slideR]{animation:rSR .6s ease-out both}@keyframes rSR{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
.pr[data-a=fadeUp]{animation:rFU .6s ease-out both}@keyframes rFU{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.pr[data-a=pop]{animation:rPp .5s cubic-bezier(.68,-.55,.265,1.55) both}@keyframes rPp{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
.pr[data-a=flipIn]{animation:rFl .7s ease-out both}@keyframes rFl{from{opacity:0;transform:perspective(400px) rotateX(90deg)}to{opacity:1;transform:perspective(400px) rotateX(0)}}
.pr[data-a=bounceIn]{animation:rBn .8s cubic-bezier(.215,.61,.355,1) both}@keyframes rBn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
.pr:nth-child(1){animation-delay:.05s}.pr:nth-child(2){animation-delay:.12s}.pr:nth-child(3){animation-delay:.19s}.pr:nth-child(4){animation-delay:.26s}.pr:nth-child(5){animation-delay:.33s}.pr:nth-child(6){animation-delay:.4s}.pr:nth-child(7){animation-delay:.47s}.pr:nth-child(8){animation-delay:.54s}
.pk{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;margin-right:10px;flex-shrink:0;font-family:'Luckiest Guy',cursive}
.pk.r1{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;box-shadow:0 0 12px rgba(255,215,0,.5);animation:rkG 1.5s ease-in-out infinite alternate}
.pk.r2{background:linear-gradient(135deg,#c0c0c0,#808080);color:#000}.pk.r3{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff}
.pk.rd{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}
@keyframes rkG{from{box-shadow:0 0 12px rgba(255,215,0,.5)}to{box-shadow:0 0 30px rgba(255,215,0,.8),0 0 60px rgba(255,215,0,.3)}}
.pn{color:#fff;font-size:13px;flex:1;letter-spacing:1px}
.ps{font-size:15px;font-weight:900;flex-shrink:0}

/* Widget giriş animasyonları */
.we[data-w=fadeIn]{animation:wFd 1s ease both}@keyframes wFd{from{opacity:0}to{opacity:1}}
.we[data-w=slideDown]{animation:wSD .8s ease-out both}@keyframes wSD{from{opacity:0;transform:translateY(-60px)}to{opacity:1;transform:translateY(0)}}
.we[data-w=slideUp]{animation:wSU .8s ease-out both}@keyframes wSU{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
.we[data-w=zoomIn]{animation:wZI .6s cubic-bezier(.68,-.55,.265,1.55) both}@keyframes wZI{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
.we[data-w=rotateIn]{animation:wRI .8s ease-out both}@keyframes wRI{from{opacity:0;transform:rotate(-180deg) scale(.3)}to{opacity:1;transform:rotate(0) scale(1)}}
.we[data-w=bounceIn]{animation:wBI 1s cubic-bezier(.215,.61,.355,1) both}@keyframes wBI{0%{opacity:0;transform:scale(.3)}40%{transform:scale(1.1)}60%{transform:scale(.9)}80%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
.we[data-w=flipIn]{animation:wFI .8s ease-out both}@keyframes wFI{from{opacity:0;transform:perspective(400px) rotateY(90deg)}to{opacity:1;transform:perspective(400px) rotateY(0)}}

.foot-area{text-align:center;margin-top:35px;position:relative;z-index:10}
.foot-area p{font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:3px}

@media(max-width:768px){.boards{flex-direction:column;align-items:center}.brd{width:95%}.gc{width:120px;height:160px}.pnl{width:100%;right:-110%}}
</style>
</head>

<script>
// ╔══════════════════════════════════════════════════╗
// ║  🔥 FIREBASE CONFIG - BURAYA KENDİ BİLGİLERİNİ YAZ  ║
// ╚══════════════════════════════════════════════════╝
const firebaseConfig = {
 apiKey: "AIzaSyAfDdE3WmS3wx-Acz0WfEfwW5w2MLjTsms",
  authDomain: "tiktok-overlay-8cd75.firebaseapp.com",
  databaseURL: "https://tiktok-overlay-8cd75-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tiktok-overlay-8cd75",
  storageBucket: "tiktok-overlay-8cd75.firebasestorage.app",
  messagingSenderId: "156041390775",
  appId: "1:156041390775:web:be7153db5388ff97a4bb32"
};
// ═══════════════════════════════════════════════════

// Firebase Init
let db, dbRef, firebaseOK = false;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  dbRef = db.ref('overlay');
  firebaseOK = true;
} catch(e) {
  console.error('Firebase init hatası:', e);
}

// Widget Mode
const QP = new URLSearchParams(location.search);
const WM = QP.get('widget');

// Config
let C = getDef();
function getDef(){return{
  mt:{text:'🎁 HEDİYE GALERİSİ 🎁',size:36,nc:'#ff0080',ni:100,nb:150,fl:true,fs:3},
  st:{text:'⚡ EN ÇOK HEDİYE GÖNDERENLER ⚡',size:24,nc:'#00d4ff',ni:80,nb:100,fl:false,fs:3},

      {n:'KralOyuncu',s:2500},{n:'NeonMaster',s:2100},{n:'GamerTR',s:1800},{n:'YıldızAvcı',s:1500},{n:'ShadowFox',s:1200}]},
    2:{t:'⚡ HEDİYE KRALLARI',nc:'#00d4ff',ni:100,nb:100,fl:true,fs:3,p:[
      {n:'DiamondKing',s:15000},{n:'GiftQueen',s:12000},{n:'RoseHero',s:9500},{n:'CoinMaster',s:7000},{n:'StarLight',s:5500}]},

}}

// Merge helper
function merge(def, src){
  if(!src) return def;
  const out = {...def};
  for(const k in src){
    if(src[k]!==null && typeof src[k]==='object' && !Array.isArray(src[k]) && typeof def[k]==='object' && !Array.isArray(def[k])){
      out[k] = merge(def[k], src[k]);
    } else {
      out[k] = src[k];
    }
  }
  return out;
}

// ════════════════════════════════════════
//  FIREBASE READ / WRITE
// ════════════════════════════════════════
let saveTimer;
function saveFB(){
  if(!firebaseOK) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    dbRef.set(C).then(()=>{
      setFBStatus('ok','Kaydedildi ✓');
    }).catch(e=>{
      setFBStatus('err','Yazma hatası!');
      console.error(e);
    });
  }, 400);
}

function loadFB(callback){
  if(!firebaseOK){callback();return;}
  dbRef.once('value', snap=>{
    if(snap.exists()){
      C = merge(getDef(), snap.val());
      // Liste players düzeltme (Firebase array'leri object yapar)
      for(let n=1;n<=3;n++){
        if(C.L[n] && C.L[n].p && !Array.isArray(C.L[n].p)){
          C.L[n].p = Object.values(C.L[n].p);
        }
      }
      if(C.gifts && !Array.isArray(C.gifts)){
        C.gifts = Object.values(C.gifts);
      }
    } else {
      C = getDef();
      dbRef.set(C);
    }
    setFBStatus('ok','Bağlı ✓');
    callback();
  }, err=>{
    setFBStatus('err','Bağlantı hatası!');
    console.error(err);
    callback();
  });
}

function listenFB(){
  if(!firebaseOK) return;
  dbRef.on('value', snap=>{
    if(!snap.exists()) return;
    C = merge(getDef(), snap.val());
    for(let n=1;n<=3;n++){
      if(C.L[n]&&C.L[n].p&&!Array.isArray(C.L[n].p)) C.L[n].p=Object.values(C.L[n].p);
    }
    if(C.gifts&&!Array.isArray(C.gifts)) C.gifts=Object.values(C.gifts);
    renderAll();
    setFBStatus('ok','Canlı senkron ✓');
  });
}

function setFBStatus(type, txt){
  const dot=$('fbDot'),tx=$('fbTxt');
  if(!dot||!tx)return;
  dot.className='fb-dot '+type;
  tx.textContent=txt;
}

function mkNeon(c,i,b){const f=i/100;return`0 0 ${7*f}px #fff,0 0 ${10*f}px #fff,0 0 ${21*f}px #fff,0 0 ${42*f}px ${c},0 0 ${82*f}px ${c},0 0 ${b*f}px ${c}`}
function setNeon(el,o){if(!el)return;el.style.textShadow=mkNeon(o.nc,o.ni,o.nb);el.style.color='#fff';if(o.fl){el.classList.add('nfl');el.style.setProperty('--fs',o.fs+'s')}else{el.classList.remove('nfl')}}

//  RENDER
// ════════════════════════════════════════
function renderAll(){
  const mt=$('elMT');if(mt){mt.textContent=C.mt.text;mt.style.fontSize=C.mt.size+'px';setNeon(mt,C.mt)}
  const st=$('elST');if(st){st.textContent=C.st.text;st.style.fontSize=C.st.size+'px';setNeon(st,C.st)}
  const ft=$('elFT');if(ft) ft.textContent=C.ft;
  renderGifts();
  for(let i=1;i<=3;i++) renderList(i);
  applyWA();applyBg();genPrt();genStr();
}

function renderGifts(){
  const w=$('gWrap');if(!w)return;w.innerHTML='';
  if(!C.gifts||!C.gifts.length)return;
  C.gifts.forEach((g,i)=>{
    const c=document.createElement('div');c.className='gc';c.setAttribute('data-a',C.ga||'float');
    c.style.border=`2px solid ${g.cl}55`;c.style.boxShadow=`0 0 30px ${g.cl}33,inset 0 0 25px ${g.cl}15`;
    c.style.background=`linear-gradient(135deg,${g.cl}18,${g.cl}08)`;c.style.animationDelay=(i*.4)+'s';
    let v=g.tp==='image'&&g.img?`<div class="gc-v"><img src="${g.img}"></div>`:`<div class="gc-v">${g.em||'🎁'}</div>`;
    c.innerHTML=`${v}<div class="gc-n">${g.nm||''}</div><div class="gc-vl">${g.vl||''}</div>`;
    c.onmouseenter=()=>{c.style.boxShadow=`0 0 50px ${g.cl}55,inset 0 0 35px ${g.cl}25`};
    c.onmouseleave=()=>{c.style.boxShadow=`0 0 30px ${g.cl}33,inset 0 0 25px ${g.cl}15`};
    w.appendChild(c);
  });
}

function renderList(n){
  const L=C.L[n];if(!L)return;
  const te=$('lt'+n);if(te){te.textContent=L.t;setNeon(te,L)}
  const bd=$('wL'+n);if(bd){bd.style.border=`2px solid ${L.nc}55`;bd.style.boxShadow=`0 0 35px ${L.nc}18`;bd.style.background=`linear-gradient(180deg,${L.nc}12,rgba(10,10,30,.95))`}
  const hd=$('bh'+n);if(hd) hd.style.background=`linear-gradient(135deg,${L.nc}30,${L.nc}10)`;
  const bb=$('lb'+n);if(!bb)return;bb.innerHTML='';
  if(!L.p||!L.p.length)return;
  [...L.p].sort((a,b)=>(b.s||0)-(a.s||0)).forEach((p,i)=>{
    const r=document.createElement('div');r.className='pr';r.setAttribute('data-a',C.la||'slideL');
    r.style.background=`linear-gradient(90deg,${L.nc}12,${L.nc}02)`;r.style.borderLeft=`3px solid ${L.nc}88`;
    r.style.animationDelay=(i*.1)+'s';
    let rc='rd',ri=i+1;if(i===0){rc='r1';ri='👑'}else if(i===1){rc='r2';ri='🥈'}else if(i===2){rc='r3';ri='🥉'}
    r.innerHTML=`<div class="pk ${rc}">${ri}</div><div class="pn">${p.n||''}</div><div class="ps" style="color:${L.nc};text-shadow:0 0 10px ${L.nc}55">${fmtS(p.s||0)}</div>`;
    bb.appendChild(r);
  });
}

function applyWA(){
  const wa=C.wa||{};
  const g=$('wGifts');if(g)g.setAttribute('data-w',wa.gifts||'fadeIn');
  [1,2,3].forEach(n=>{const e=$('wL'+n);if(e)e.setAttribute('data-w',wa['list'+n]||'fadeIn')});
}
function applyBg(){
  if(!C.bg)return;
  const r=parseInt(C.bg.c.substr(1,2),16),g=parseInt(C.bg.c.substr(3,2),16),b=parseInt(C.bg.c.substr(5,2),16);
  document.body.style.backgroundColor=`rgba(${r},${g},${b},${(C.bg.o||100)/100})`;
}
function fmtS(s){return s>=10000?(s/1000).toFixed(1)+'K':s.toLocaleString()}
function genPrt(){const c=$('particles');if(!c)return;c.innerHTML='';const cls=['#ff0080','#00d4ff','#00ff88','#b200ff','#ffd700'];for(let i=0;i<(C.prt||0);i++){const d=document.createElement('div');d.className='ptc';const s=Math.random()*6+2,cl=cls[Math.floor(Math.random()*cls.length)];d.style.cssText=`width:${s}px;height:${s}px;background:${cl};box-shadow:0 0 ${s*2}px ${cl};left:${Math.random()*100}%;animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*10}s`;c.appendChild(d)}}
function genStr(){const c=$('stars');if(!c)return;c.innerHTML='';for(let i=0;i<(C.str||0);i++){const d=document.createElement('div');d.className='star';d.style.cssText=`top:${Math.random()*50}%;left:${Math.random()*30}%;animation-duration:${Math.random()*3+2}s;animation-delay:${Math.random()*8}s`;c.appendChild(d)}}

function cpU(id){const t=$(id).textContent;navigator.clipboard.writeText(t).then(()=>notify('📋 Kopyalandı!')).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove();notify('📋 Kopyalandı!')})}

// --- TEMA ---
function bldT(){
  $('pT').innerHTML=`
    <h3>🎨 Arka Plan</h3>
    <div class="inl"><div><label>Renk</label><input type="color" value="${C.bg.c}" onchange="C.bg.c=this.value;applyBg();saveFB()"></div>
    <div><label>Saydamlık (${C.bg.o}%)</label><input type="range" min="0" max="100" value="${C.bg.o}" oninput="C.bg.o=+this.value;applyBg();saveFB();this.previousElementSibling.textContent='Saydamlık ('+this.value+'%)'"></div></div>
    <h3>🌟 Parçacıklar (${C.prt})</h3>
    <input type="range" min="0" max="80" value="${C.prt}" oninput="C.prt=+this.value;genPrt();saveFB();this.previousElementSibling.textContent='🌟 Parçacıklar ('+this.value+')'">
    <h3>⭐ Kayan Yıldızlar (${C.str})</h3>
    <input type="range" min="0" max="20" value="${C.str}" oninput="C.str=+this.value;genStr();saveFB();this.previousElementSibling.textContent='⭐ Kayan Yıldızlar ('+this.value+')'">
    <hr class="sp">
    <h3>🔥 Firebase Durumu</h3>
    <div style="background:rgba(255,255,255,.03);padding:12px;border-radius:10px;margin-bottom:10px">
      <p style="color:${firebaseOK?'#00ff88':'#ff4444'};font-size:11px;font-family:'Orbitron',sans-serif">
        ${firebaseOK?'✅ Firebase bağlı! Anlık senkron aktif.':'❌ Firebase bağlı değil. Config\'i kontrol edin.'}
      </p>
    </div>
    <hr class="sp">
    <h3>💾 Yedekleme</h3>
    <button class="bt bt-gn" onclick="expCfg()">📤 JSON Dışa Aktar</button>
    <button class="bt bt-bl" onclick="$('impF').click()">📥 JSON İçe Aktar</button>
    <button class="bt bt-rd" onclick="rstCfg()">🗑 Sıfırla</button>
    <input type="file" id="impF" accept=".json" style="display:none" onchange="impCfg(this)">`;
}
function expCfg(){const b=new Blob([JSON.stringify(C,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='overlay-config.json';a.click();notify('📤 İndirildi!')}
function impCfg(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{C=JSON.parse(e.target.result);saveFB();buildPanel();renderAll();notify('📥 Yüklendi!')}catch(x){notify('❌ Hata!')}};r.readAsText(f);inp.value=''}
function rstCfg(){if(!confirm('Sıfırlansın mı?'))return;C=getDef();saveFB();buildPanel();renderAll();notify('🗑 Sıfırlandı!')}

//  HELPERS
// ════════════════════════════════════════
function $(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/"/g,'&quot;')}
function notify(m){const d=document.createElement('div');d.style.cssText='position:fixed;top:55px;right:20px;background:linear-gradient(135deg,#ff0080,#7928ca);color:#fff;padding:14px 22px;border-radius:14px;font-family:"Luckiest Guy",cursive;font-size:13px;z-index:99999;box-shadow:0 0 25px rgba(255,0,128,.5);pointer-events:none';d.textContent=m;document.body.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transform='translateX(80px)';d.style.transition='all .4s';setTimeout(()=>d.remove(),400)},2500)}

  setFBStatus('wait','Bağlanıyor...');
